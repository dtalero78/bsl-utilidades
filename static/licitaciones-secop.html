<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licitaciones SECOP - BSL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Figtree', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
      min-height: 100vh;
      padding: 20px;
      color: #e0e7ee;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      padding: 30px 20px 10px;
    }

    .logo {
      width: 100px;
      height: auto;
      margin-bottom: 16px;
      filter: brightness(0) invert(1);
    }

    header h1 {
      font-size: 2.2em;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 1em;
      opacity: 0.75;
      font-weight: 400;
      max-width: 720px;
      margin: 0 auto;
    }

    header a {
      color: #34d399;
      text-decoration: none;
    }

    .panel {
      background: rgba(42, 55, 75, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 24px;
    }

    .panel h2 {
      color: #ffffff;
      margin-bottom: 18px;
      font-size: 1.25em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.3px;
    }

    .panel h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 22px;
      background: linear-gradient(180deg, #34d399 0%, #10b981 100%);
      border-radius: 2px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #cdd6df;
      font-weight: 500;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 0.95em;
      font-family: 'Figtree', sans-serif;
      color: #ffffff;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: rgba(52, 211, 153, 0.5);
      background: rgba(52, 211, 153, 0.05);
      box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.1);
    }

    .form-group select option { background: #1f2937; color: #ffffff; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 22px;
      border: none;
      border-radius: 12px;
      font-size: 0.95em;
      font-weight: 600;
      font-family: 'Figtree', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
      color: #ffffff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(52, 211, 153, 0.3);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #e0e7ee;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      color: #cdd6df;
      font-size: 0.9em;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
      font-size: 0.85em;
      font-weight: 500;
    }

    .results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: rgba(42, 55, 75, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 18px 20px;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: rgba(52, 211, 153, 0.35);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .card-title {
      color: #ffffff;
      font-size: 1.05em;
      font-weight: 600;
      line-height: 1.35;
      flex: 1;
      min-width: 240px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      font-size: 0.78em;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #cdd6df;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 500;
    }
    .pill.green {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.3);
    }
    .pill.amber {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.3);
    }
    .pill.blue {
      background: rgba(96, 165, 250, 0.15);
      color: #60a5fa;
      border-color: rgba(96, 165, 250, 0.3);
    }
    .value.expired { color: #fca5a5; font-weight: 600; }

    .card-desc {
      color: #cdd6df;
      font-size: 0.92em;
      line-height: 1.55;
      margin: 8px 0 12px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px 18px;
      font-size: 0.85em;
    }
    .card-grid .item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .card-grid .label {
      color: #8b95a3;
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-grid .value { color: #e0e7ee; }
    .card-grid .value.amount { color: #34d399; font-weight: 600; }

    .card-link {
      display: inline-block;
      margin-top: 12px;
      color: #34d399;
      text-decoration: none;
      font-size: 0.88em;
      font-weight: 500;
    }
    .card-link:hover { text-decoration: underline; }

    .empty,
    .loading,
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #cdd6df;
      background: rgba(42, 55, 75, 0.4);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 14px;
    }
    .error { color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(52, 211, 153, 0.3);
      border-top-color: #34d399;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      padding: 20px;
      margin-top: 30px;
      font-size: 0.85em;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.7em; }
      .panel { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="/static/logo-bsl.png" alt="BSL Logo" class="logo">
      <h1>Licitaciones SECOP</h1>
      <p>
        Búsqueda de procesos de contratación pública en Colombia (SECOP I y II)
        usando la API oficial de <a href="https://www.datos.gov.co" target="_blank" rel="noopener">datos.gov.co</a>.
      </p>
    </header>

    <!-- Panel de filtros -->
    <div class="panel">
      <h2>Filtros</h2>
      <form id="filtros-form" onsubmit="return buscar(event)">
        <div class="filters-grid">
          <div class="form-group">
            <label for="dataset">Dataset</label>
            <select id="dataset">
              <option value="secop_ii_procesos" selected>SECOP II — Procesos</option>
              <option value="secop_ii_contratos">SECOP II — Contratos</option>
              <option value="secop_i_procesos">SECOP I — Procesos</option>
              <option value="secop_integrado">SECOP Integrado (I + II)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="keywords">Palabras clave (descripción)</label>
            <input
              type="text"
              id="keywords"
              placeholder="SALUD OCUPACIONAL, EXAMEN%MEDICO, AUDIOMETR..."
              value="SALUD OCUPACIONAL, EXAMEN%MEDICO, AUDIOMETR, OPTOMETR, RIESGO%PSICOSOCIAL, SEGURIDAD Y SALUD%TRABAJO, MEDICINA%LABORAL"
            >
          </div>

          <div class="form-group">
            <label for="fase">Fase del proceso</label>
            <select id="fase">
              <option value="">— Todas —</option>
              <option value="Presentación de oferta">Presentación de oferta</option>
              <option value="Borrador">Borrador</option>
              <option value="Adjudicado">Adjudicado</option>
              <option value="Celebrado">Celebrado</option>
              <option value="Liquidado">Liquidado</option>
              <option value="Convocado">Convocado</option>
            </select>
          </div>

          <div class="form-group">
            <label for="departamento">Departamento</label>
            <input type="text" id="departamento" placeholder="Bogotá, Antioquia, Valle...">
          </div>

          <div class="form-group">
            <label for="entidad">Entidad (contiene)</label>
            <input type="text" id="entidad" placeholder="ICBF, Ministerio, Alcaldía...">
          </div>

          <div class="form-group">
            <label for="fecha_desde">Publicado desde</label>
            <input type="date" id="fecha_desde">
          </div>

          <div class="form-group">
            <label for="limit">Máx. resultados</label>
            <select id="limit">
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>

          <div class="form-group">
            <label for="solo_vigentes">Mostrar</label>
            <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;font-weight:500;font-size:0.95em;">
              <input type="checkbox" id="solo_vigentes" checked style="width:18px;height:18px;cursor:pointer;accent-color:#34d399;">
              Solo vigentes (fecha de cierre futura)
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="btn-buscar">Buscar licitaciones</button>
          <button type="button" class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
          <button type="button" class="btn btn-secondary" onclick="descargarJSON()">Descargar JSON</button>
        </div>
      </form>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div id="status-text">Configura los filtros y haz clic en <strong>Buscar licitaciones</strong>.</div>
      <div><span class="badge" id="status-badge" style="display:none;">0 resultados</span></div>
    </div>

    <!-- Resultados -->
    <div id="results" class="results"></div>

    <footer>
      Fuente: Colombia Compra Eficiente · datos.gov.co (Socrata Open Data API)
    </footer>
  </div>

  <script>
    let ultimosResultados = [];

    function fechaDefault() {
      const d = new Date();
      d.setDate(d.getDate() - 90);
      return d.toISOString().slice(0, 10);
    }

    document.getElementById('fecha_desde').value = fechaDefault();

    function limpiarFiltros() {
      document.getElementById('dataset').value = 'secop_ii_procesos';
      document.getElementById('keywords').value = '';
      document.getElementById('fase').value = '';
      document.getElementById('departamento').value = '';
      document.getElementById('entidad').value = '';
      document.getElementById('fecha_desde').value = fechaDefault();
      document.getElementById('limit').value = '200';
    }

    function fmtMoney(n) {
      const num = Number(n);
      if (!isFinite(num) || num <= 0) return '—';
      return num.toLocaleString('es-CO', {
        style: 'currency', currency: 'COP', maximumFractionDigits: 0
      });
    }

    function isExpired(s) {
      if (!s) return false;
      const d = new Date(s);
      if (isNaN(d.getTime())) return false;
      return d.getTime() < Date.now();
    }

    function fmtDate(s) {
      if (!s) return '—';
      try {
        const d = new Date(s);
        if (isNaN(d.getTime())) return s;
        return d.toLocaleDateString('es-CO', {
          year: 'numeric', month: 'short', day: '2-digit'
        });
      } catch { return s; }
    }

    function pickField(row, candidates) {
      for (const k of candidates) {
        if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
      }
      return null;
    }

    function pillForFase(fase) {
      if (!fase) return '';
      const f = fase.toLowerCase();
      let cls = 'pill';
      if (f.includes('presentación') || f.includes('convocado')) cls += ' green';
      else if (f.includes('borrador')) cls += ' amber';
      else if (f.includes('adjudic') || f.includes('celebrado') || f.includes('liquidado')) cls += ' blue';
      return `<span class="${cls}">${fase}</span>`;
    }

    function renderCard(row) {
      const titulo = pickField(row, [
        'descripci_n_del_procedimiento',
        'nombre_del_procedimiento',
        'descripcion_del_proceso',
        'descripcion_del_procedimiento',
        'objeto_del_proceso',
        'detalle_del_objeto_a_contratar',
        'objeto_a_contratar',
        'objeto_del_contrato'
      ]) || '(sin descripción)';

      const entidad = pickField(row, ['entidad', 'nombre_entidad', 'nombre_de_la_entidad']) || '—';
      const nit = pickField(row, ['nit_entidad', 'nit_de_la_entidad']) || '';
      const dpto = pickField(row, ['departamento_entidad', 'departamento']) || '—';
      const ciudad = pickField(row, ['ciudad_entidad', 'ciudad', 'municipio_entidad']) || '';
      const fase = pickField(row, ['fase', 'estado_del_procedimiento', 'estado_del_proceso', 'estado_contrato']);
      const modalidad = pickField(row, ['modalidad_de_contratacion', 'tipo_de_contrato', 'modalidad_de_contrataci_n']) || '—';
      const valor = pickField(row, [
        'precio_base',
        'valor_total_adjudicacion',
        'valor_del_contrato',
        'cuantia_proceso',
        'cuantia_definitiva_del_contrato',
        'valor_estimado'
      ]);
      const fechaPub = pickField(row, [
        'fecha_de_publicacion_del',
        'fecha_de_publicacion_del_proceso',
        'fecha_de_cargue_en_el_secop',
        'fecha_de_firma'
      ]);
      const fechaCierre = pickField(row, [
        'fecha_de_recepcion_de',
        'fecha_de_cierre_del_proceso',
        'fecha_de_fin_del_contrato',
        'fecha_fin_ejec_contrato',
        'fecha_fin_ejecuci_n',
        'fecha_de_terminacion_del_contrato',
        'fecha_de_terminaci_n_del_contrato'
      ]);
      const idProceso = pickField(row, ['id_del_proceso', 'numero_de_proceso', 'numero_del_contrato']) || '';
      const url = pickField(row, ['urlproceso', 'url_proceso', 'url_del_contrato']);

      const ubicacion = [ciudad, dpto].filter(Boolean).join(', ') || '—';

      let urlHtml = '';
      if (url) {
        let href = url;
        if (typeof url === 'object' && url.url) href = url.url;
        urlHtml = `<a href="${href}" target="_blank" rel="noopener" class="card-link">Ver en SECOP →</a>`;
      }

      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${entidad}</div>
            <div class="card-meta">
              ${pillForFase(fase)}
              ${idProceso ? `<span class="pill">${idProceso}</span>` : ''}
            </div>
          </div>
          <div class="card-desc">${titulo}</div>
          <div class="card-grid">
            <div class="item">
              <span class="label">Modalidad</span>
              <span class="value">${modalidad}</span>
            </div>
            <div class="item">
              <span class="label">Ubicación</span>
              <span class="value">${ubicacion}</span>
            </div>
            <div class="item">
              <span class="label">NIT</span>
              <span class="value">${nit || '—'}</span>
            </div>
            <div class="item">
              <span class="label">Valor</span>
              <span class="value amount">${fmtMoney(valor)}</span>
            </div>
            <div class="item">
              <span class="label">Publicación</span>
              <span class="value">${fmtDate(fechaPub)}</span>
            </div>
            <div class="item">
              <span class="label">Cierre / Terminación</span>
              <span class="value${isExpired(fechaCierre) ? ' expired' : ''}">${fmtDate(fechaCierre)}${isExpired(fechaCierre) ? ' (vencido)' : ''}</span>
            </div>
          </div>
          ${urlHtml}
        </div>
      `;
    }

    async function buscar(event) {
      event.preventDefault();
      const btn = document.getElementById('btn-buscar');
      const status = document.getElementById('status-text');
      const badge = document.getElementById('status-badge');
      const results = document.getElementById('results');

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Consultando datos.gov.co...';
      badge.style.display = 'none';
      results.innerHTML = '';

      const params = new URLSearchParams();
      params.set('dataset', document.getElementById('dataset').value);
      const kw = document.getElementById('keywords').value.trim();
      if (kw) params.set('keywords', kw);
      const fase = document.getElementById('fase').value.trim();
      if (fase) params.set('fase', fase);
      const dpto = document.getElementById('departamento').value.trim();
      if (dpto) params.set('departamento', dpto);
      const entidad = document.getElementById('entidad').value.trim();
      if (entidad) params.set('entidad', entidad);
      const fecha = document.getElementById('fecha_desde').value;
      if (fecha) params.set('fecha_desde', fecha);
      params.set('limit', document.getElementById('limit').value);
      params.set('solo_vigentes', document.getElementById('solo_vigentes').checked ? '1' : '0');

      try {
        const r = await fetch('/api/secop-licitaciones?' + params.toString());
        const data = await r.json();

        if (!data.success) {
          ultimosResultados = [];
          status.innerHTML = '';
          results.innerHTML = `<div class="error">❌ ${data.error || 'Error en la consulta'}${data.detail ? '<br><small style="opacity:.7">' + data.detail + '</small>' : ''}</div>`;
          return false;
        }

        ultimosResultados = data.datos || [];
        const n = ultimosResultados.length;

        badge.textContent = `${n} resultado${n === 1 ? '' : 's'}`;
        badge.style.display = 'inline-block';
        status.innerHTML = n
          ? `Mostrando <strong>${n}</strong> licitaciones · dataset <code>${data.dataset}</code>`
          : 'No se encontraron licitaciones con esos filtros.';

        if (!n) {
          results.innerHTML = '<div class="empty">Sin resultados. Prueba relajando los filtros (palabras, fecha o fase).</div>';
        } else {
          results.innerHTML = ultimosResultados.map(renderCard).join('');
        }
      } catch (err) {
        status.innerHTML = '';
        results.innerHTML = `<div class="error">❌ Error de red: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
      }

      return false;
    }

    function descargarJSON() {
      if (!ultimosResultados.length) {
        alert('No hay resultados para descargar. Realiza una búsqueda primero.');
        return;
      }
      const blob = new Blob([JSON.stringify(ultimosResultados, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `secop-licitaciones-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
